<svg viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="820" fill="#0a0e1a"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#3b82f6" letter-spacing="2">SCOPEGUARD SYSTEM ARCHITECTURE</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#64748b">Least-Privilege AI Agent Authorization Console — with Real Sub-Agent Enforcement</text>

  <!-- User -->
  <rect x="325" y="68" width="250" height="52" rx="10" fill="#1a2235" stroke="#2a3f5f" stroke-width="1"/>
  <text x="365" y="90" font-size="11" fill="#64748b">&#128100;</text>
  <text x="450" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#e2e8f0">User</text>
  <text x="450" y="108" text-anchor="middle" font-size="11" fill="#64748b">Web Browser</text>

  <!-- User to UI -->
  <line x1="450" y1="120" x2="450" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="462" y="139" font-size="10" fill="#3b82f6">HTTP Requests</text>

  <!-- ScopeGuard UI -->
  <rect x="300" y="150" width="300" height="52" rx="10" fill="#1a2235" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="450" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#e2e8f0">ScopeGuard UI</text>
  <text x="450" y="190" text-anchor="middle" font-size="11" fill="#64748b">Vanilla HTML / CSS / JS</text>

  <!-- UI to Backend -->
  <line x1="450" y1="202" x2="450" y2="230" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="462" y="221" font-size="10" fill="#10b981">REST API calls</text>

  <!-- Express Backend -->
  <rect x="250" y="232" width="400" height="52" rx="10" fill="#0d3320" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Express Backend</text>
  <text x="450" y="272" text-anchor="middle" font-size="11" fill="#6ee7b7">Node.js · Auth0 OIDC · REST API</text>

  <!-- Backend splits LEFT to Primary Agent -->
  <path d="M330 284 L330 310 L180 310 L180 336" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="none"/>
  <text x="220" y="305" font-size="10" fill="#3b82f6">/agent</text>

  <!-- Backend splits RIGHT to Sub Agent -->
  <path d="M570 284 L570 310 L720 310 L720 336" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="630" y="305" font-size="10" fill="#8b5cf6">/agent/sub</text>

  <!-- Backend DOWN to Auth0 Token Vault (center path) -->
  <line x1="450" y1="284" x2="450" y2="490" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="462" y="400" font-size="10" fill="#f59e0b">Request OAuth token</text>

  <!-- Backend to Audit Log (right) -->
  <path d="M650 258 L820 258 L820 580" stroke="#ef4444" stroke-width="1" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="735" y="252" font-size="10" fill="#ef4444">Log all actions</text>

  <!-- PRIMARY AGENT -->
  <rect x="60" y="338" width="240" height="56" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="360" text-anchor="middle" font-size="14" font-weight="600" fill="#93c5fd">Primary Agent</text>
  <text x="180" y="378" text-anchor="middle" font-size="11" fill="#64748b">repo:read · repo:write · issues:write</text>

  <!-- SUB AGENT -->
  <rect x="600" y="338" width="240" height="56" rx="10" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="720" y="360" text-anchor="middle" font-size="14" font-weight="600" fill="#c4b5fd">Sub-Agent</text>
  <text x="720" y="378" text-anchor="middle" font-size="11" fill="#64748b">repo:read · issues:read ONLY</text>

  <!-- Primary Agent to Claude Sonnet -->
  <line x1="180" y1="394" x2="180" y2="436" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="116" y="420" font-size="10" fill="#f59e0b">Classify risk</text>

  <!-- Sub Agent to Claude Sonnet (right) -->
  <line x1="720" y1="394" x2="720" y2="436" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow)"/>
  <text x="726" y="420" font-size="10" fill="#f59e0b">Classify risk</text>

  <!-- Claude Sonnet LEFT -->
  <rect x="60" y="438" width="240" height="52" rx="10" fill="#3d2600" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="180" y="460" text-anchor="middle" font-size="14" font-weight="600" fill="#fcd34d">Claude Sonnet</text>
  <text x="180" y="478" text-anchor="middle" font-size="11" fill="#64748b">Risk Classifier &amp; Action Planner</text>

  <!-- Claude Sonnet RIGHT -->
  <rect x="600" y="438" width="240" height="52" rx="10" fill="#3d2600" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="720" y="460" text-anchor="middle" font-size="14" font-weight="600" fill="#fcd34d">Claude Sonnet</text>
  <text x="720" y="478" text-anchor="middle" font-size="11" fill="#64748b">Risk Classifier &amp; Action Planner</text>

  <!-- Primary Claude to Risk Policy Engine -->
  <line x1="180" y1="490" x2="180" y2="530" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="116" y="516" font-size="10" fill="#f59e0b">Enforce policy</text>

  <!-- Sub Claude to Scope Whitelist -->
  <line x1="720" y1="490" x2="720" y2="530" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="726" y="516" font-size="10" fill="#8b5cf6">Whitelist check</text>

  <!-- Risk Policy Engine -->
  <rect x="60" y="532" width="240" height="52" rx="10" fill="#3d2600" stroke="#f59e0b" stroke-width="1"/>
  <text x="180" y="554" text-anchor="middle" font-size="14" font-weight="600" fill="#fcd34d">Risk Policy Engine</text>
  <text x="180" y="572" text-anchor="middle" font-size="11" fill="#f59e0b">LOW · MEDIUM · HIGH</text>

  <!-- Scope Whitelist -->
  <rect x="600" y="532" width="240" height="52" rx="10" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="720" y="554" text-anchor="middle" font-size="14" font-weight="600" fill="#c4b5fd">Scope Whitelist</text>
  <text x="720" y="572" text-anchor="middle" font-size="11" fill="#64748b">list_repos · list_issues · get_user</text>

  <!-- Risk Policy to Auth0 -->
  <path d="M180 584 L180 620 L380 620 L380 580 L420 560" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow)"/>

  <!-- Auth0 Token Vault CENTER -->
  <rect x="350" y="492" width="200" height="52" rx="10" fill="#0a3328" stroke="#10b981" stroke-width="1.5"/>
  <text x="370" y="511" font-size="12" fill="#10b981">&#128274;</text>
  <text x="450" y="511" text-anchor="middle" font-size="14" font-weight="600" fill="#6ee7b7">Auth0 Token Vault</text>
  <text x="450" y="529" text-anchor="middle" font-size="11" fill="#64748b">Stores &amp; Refreshes Tokens</text>

  <!-- Token Vault to GitHub API -->
  <line x1="450" y1="544" x2="450" y2="630" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="462" y="590" font-size="10" fill="#10b981">Scoped access token</text>

  <!-- Whitelist allowed to GitHub -->
  <path d="M670 584 L670 650 L530 650 L530 672" stroke="#10b981" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="560" y="645" font-size="10" fill="#10b981">allowed</text>

  <!-- Whitelist blocked -->
  <rect x="760" y="590" width="120" height="44" rx="8" fill="#3d0f0f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="820" y="608" text-anchor="middle" font-size="12" font-weight="600" fill="#fca5a5">BLOCKED</text>
  <text x="820" y="624" text-anchor="middle" font-size="10" fill="#64748b">Scope escalation</text>
  <line x1="770" y1="584" x2="800" y2="592" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="724" y="582" font-size="10" fill="#ef4444">blocked</text>

  <!-- GitHub API -->
  <rect x="350" y="632" width="200" height="52" rx="10" fill="#0f2d1a" stroke="#10b981" stroke-width="1.5"/>
  <text x="450" y="654" text-anchor="middle" font-size="14" font-weight="600" fill="#86efac">GitHub API</text>
  <text x="450" y="672" text-anchor="middle" font-size="11" fill="#64748b">Repos · Issues · Delete</text>

  <!-- GitHub to Audit -->
  <path d="M550 658 L820 658 L820 632" stroke="#64748b" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow-gray)"/>

  <!-- Blocked to Audit -->
  <line x1="820" y1="634" x2="820" y2="630" stroke="#64748b" stroke-width="1" fill="none"/>

  <!-- SQLite Audit Log RIGHT -->
  <rect x="760" y="582" width="0" height="0"/>
  <rect x="720" y="476" width="0" height="0"/>

  <!-- SQLite Audit Log -->
  <rect x="750" y="580" width="130" height="52" rx="10" fill="#2d0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="815" y="602" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">SQLite Audit Log</text>
  <text x="815" y="620" text-anchor="middle" font-size="10" fill="#64748b">Immutable Action Records</text>

  <!-- All paths log to audit -->
  <path d="M180 584 L180 740 L750 740 L750 610" stroke="#64748b" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow-gray)"/>
  <path d="M450 684 L450 740 L750 740" stroke="#64748b" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <path d="M820 634 L820 740 L750 740" stroke="#64748b" stroke-width="1" fill="none" stroke-dasharray="3,2"/>

  <!-- Risk Levels Legend -->
  <rect x="60" y="650" width="240" height="80" rx="8" fill="#111827" stroke="#1e2d4a" stroke-width="1"/>
  <text x="180" y="670" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">RISK LEVELS</text>
  <circle cx="80" cy="688" r="5" fill="#10b981"/>
  <text x="92" y="692" font-size="11" fill="#64748b">LOW — Read only</text>
  <circle cx="80" cy="708" r="5" fill="#f59e0b"/>
  <text x="92" y="712" font-size="11" fill="#64748b">MEDIUM — Limited write</text>
  <circle cx="80" cy="728" r="5" fill="#ef4444"/>
  <text x="92" y="732" font-size="11" fill="#64748b">HIGH — Step-up required</text>

  <!-- Path legend -->
  <rect x="310" y="750" width="280" height="56" rx="8" fill="#111827" stroke="#1e2d4a" stroke-width="1"/>
  <text x="450" y="768" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">AGENT PATHS</text>
  <line x1="325" y1="782" x2="355" y2="782" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="786" font-size="10" fill="#64748b">Primary agent</text>
  <line x1="430" y1="782" x2="460" y2="782" stroke="#8b5cf6" stroke-width="2"/>
  <text x="465" y="786" font-size="10" fill="#64748b">Sub-agent</text>
  <line x1="325" y1="798" x2="355" y2="798" stroke="#ef4444" stroke-width="2"/>
  <text x="360" y="802" font-size="10" fill="#64748b">Blocked path</text>
  <line x1="430" y1="798" x2="460" y2="798" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="465" y="802" font-size="10" fill="#64748b">Audit log</text>

  <!-- Footer -->
  <text x="450" y="815" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">ScopeGuard</text>
</svg>
